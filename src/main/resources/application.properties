# ===========================
# SERVER
# ===========================
server.port=${PORT:8080}

# ===========================
# SERVER ERROR
# ===========================
server.error.include-message=always
server.error.include-binding-errors=always

# ===========================
# DATABASE
# ===========================

# Railway values will be used if present.
# Otherwise localhost values will be used.

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:registration}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:1234}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# EMAIL - Mailtrap
# ===========================
spring.mail.host=smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=57d33a0dd09608
spring.mail.password=42f03cfaa1f874

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000